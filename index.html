<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced QR Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- QR Code Styling (Advanced Library) -->
  <script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center text-white">

<div class="bg-gray-900 p-6 rounded-2xl shadow-2xl w-full max-w-lg">

  <h1 class="text-2xl font-bold text-center mb-4">🔥 Advanced QR Generator</h1>

  <!-- Input -->
  <input id="qrText" type="text" placeholder="Enter text or URL..."
    class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 mb-4"/>

  <!-- Colors -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div>
      <label class="text-sm">QR Color</label>
      <input type="color" id="qrColor" value="#000000" class="w-full h-10 rounded">
    </div>

    <div>
      <label class="text-sm">Background</label>
      <input type="color" id="bgColor" value="#ffffff" class="w-full h-10 rounded">
    </div>
  </div>

  <!-- Gradient -->
  <div class="mb-4">
    <label class="flex items-center gap-2">
      <input type="checkbox" id="gradientToggle">
      Enable Gradient
    </label>

    <div class="grid grid-cols-2 gap-2 mt-2">
      <input type="color" id="grad1" value="#000000" class="w-full h-10">
      <input type="color" id="grad2" value="#ff0000" class="w-full h-10">
    </div>
  </div>

  <!-- Size -->
  <div class="mb-4">
    <label class="text-sm">Size</label>
    <input type="range" id="qrSize" min="150" max="400" value="250" class="w-full">
  </div>

  <!-- Logo -->
  <div class="mb-4">
    <label class="text-sm">Upload Logo</label>
    <input type="file" id="logoInput" accept="image/*" class="w-full text-sm">
  </div>

  <!-- Transparent -->
  <div class="mb-4">
    <label class="flex items-center gap-2">
      <input type="checkbox" id="transparentBg">
      Transparent Background
    </label>
  </div>

  <!-- Buttons -->
  <div class="flex gap-3 mb-4">
    <button onclick="generateQR()" class="flex-1 bg-indigo-600 p-3 rounded-lg">Generate</button>
    <button onclick="downloadQR()" class="flex-1 bg-green-600 p-3 rounded-lg">Download</button>
  </div>

  <!-- QR -->
  <div id="qrContainer" class="flex justify-center"></div>

</div>

<script>
let qrCode;

function generateQR() {
  const text = document.getElementById("qrText").value;
  const color = document.getElementById("qrColor").value;
  const bg = document.getElementById("bgColor").value;
  const size = document.getElementById("qrSize").value;
  const gradientEnabled = document.getElementById("gradientToggle").checked;
  const grad1 = document.getElementById("grad1").value;
  const grad2 = document.getElementById("grad2").value;
  const transparent = document.getElementById("transparentBg").checked;
  const logoFile = document.getElementById("logoInput").files[0];

  if (!text) {
    alert("Enter text!");
    return;
  }

  let logoURL = null;
  if (logoFile) {
    logoURL = URL.createObjectURL(logoFile);
  }

  // Clear previous
  document.getElementById("qrContainer").innerHTML = "";

  qrCode = new QRCodeStyling({
    width: parseInt(size),
    height: parseInt(size),
    data: text,

    image: logoURL,

    dotsOptions: gradientEnabled ? {
      type: "rounded",
      gradient: {
        type: "linear",
        rotation: 0,
        colorStops: [
          { offset: 0, color: grad1 },
          { offset: 1, color: grad2 }
        ]
      }
    } : {
      color: color,
      type: "rounded"
    },

    backgroundOptions: {
      color: transparent ? "transparent" : bg
    },

    imageOptions: {
      crossOrigin: "anonymous",
      margin: 5
    }
  });

  qrCode.append(document.getElementById("qrContainer"));
}

function downloadQR() {
  if (!qrCode) {
    alert("Generate QR first!");
    return;
  }
  qrCode.download({ name: "qr-code", extension: "png" });
}
</script>

</body>
</html>
